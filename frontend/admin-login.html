<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Admin Login — Revolution Rumble</title>
        <link rel="stylesheet" href="/static/css/packages/presets.css" />
        <link rel="stylesheet" href="/static/css/packages/admin-shell.css" />
        <link rel="stylesheet" href="/static/css/mainfiles/admin-login.css" />
    </head>
    <body>
        <main class="login-shell">
        <div class="card login-card">
            <h2 class="login-title">Revolution Admin Login</h2>
            
            <!-- Step 1: Email Selection -->
            <div id="email-step">
                <p class="login-subtitle">Select your admin account</p>
                <div id="email-buttons"></div>
            </div>

            <!-- Step 2: OTP Verification (hidden initially) -->
            <div id="otp-step" class="is-hidden">
                <p class="login-subtitle">
                    Check your email for the 6-digit code
                </p>
                <input id="otp" type="text" placeholder="Enter 6-digit code" maxlength="6" pattern="[0-9]{6}" required />
                <button id="verify-otp-btn" type="button">Verify Code</button>
                <button id="back-btn" type="button" class="button-secondary">Change Account</button>
            </div>

            <!-- Loading indicator -->
            <div id="loading" class="loading-block is-hidden">
                <div class="spinner"></div>
            </div>

            <!-- Message display -->
            <div id="message" class="message-box is-hidden"></div>
        </div>
        </main>

        <script src="/js/admin/admin-login.js"></script>
    </body>
</html>
