<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Results & Player Stats - Revolution Rumble</title>
        <meta name="description" content="Tournament results, leaderboards, and player statistics for The Revolution Rumble."/>
        <link rel="stylesheet" href="static/css/packages/navbar.css" />
        <link rel="stylesheet" href="static/css/packages/presets.css" />
        <link rel="stylesheet" href="static/css/mainfiles/results.css" />
        <link rel="stylesheet" href="static/css/mainfiles/bowlerstats.css" />
    </head>
    <body>
        <special-header></special-header>

        <div class="tab-nav">
            <div class="container">
                <button class="tab-btn active" data-tab="results">Tournament Results</button>
                <button class="tab-btn" data-tab="stats">Player Stats</button>
            </div>
        </div>

        <div class="tab-content active" id="tab-results">
            <section class="results-page">
                <div class="container">
                    <div class="results-shell">
                        <div class="results-hero">
                            <h1 class="h1" id="tournamentTitle">Select a Tournament</h1>
                            <p class="sub" id="tournamentSubtitle">Choose a tournament to view complete results and leaderboards.</p>
                        </div>

                        <div class="results-card">
                            <div class="results-toolbar">
                                <label for="tournamentSelect">Select Tournament</label>
                                <select id="tournamentSelect" class="results-select">
                                    <option value="">Choose a tournament...</option>
                                </select>
                            </div>

                            <div id="resultsContainer">
                                <div class="results-empty-state">
                                    <p>Please select a tournament to view results</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div class="tab-content" id="tab-stats">
            <div class="page-header">
                <h1>Player Stats</h1>
                <p id="subtitle">Browse bowler profiles and tournament statistics</p>
            </div>

            <main class="container wide">
                <div class="controls-bar">
                    <input
                        type="text"
                        id="search-input"
                        class="search-input"
                        placeholder="Search by name or nickname..."
                    />
                    <select id="sort-select" class="sort-select">
                        <option value="tournamentAvg-desc">Highest Tournament Avg</option>
                        <option value="tournamentAvg-asc">Lowest Tournament Avg</option>
                        <option value="currentAvg-desc">Highest Book Avg</option>
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="tournaments-desc">Most Tournaments</option>
                    </select>
                </div>

                <div id="bowlers-grid" class="bowlers-grid"></div>

                <div id="empty-state" class="empty-state" style="display:none">
                    <div class="empty-state-icon">Stats</div>
                    <h3>No Bowlers Found</h3>
                    <p>Try adjusting your search or filters</p>
                </div>
            </main>
        </div>

        <special-footer></special-footer>

        <script src="js/global/headerfooter.js"></script>
        <script src="js/results/results.js"></script>
        <script src="js/bowlerstats/bowlerstats.js"></script>
        <script src="js/global/navbar.js"></script>
        <script>
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');

            function activateTab(tabId) {
                tabBtns.forEach((button) => button.classList.toggle('active', button.dataset.tab === tabId));
                tabContents.forEach((content) => content.classList.toggle('active', content.id === `tab-${tabId}`));
                const url = new URL(window.location);

                if (tabId === 'stats') {
                    url.searchParams.set('tab', 'stats');
                } else {
                    url.searchParams.delete('tab');
                }

                window.history.replaceState({}, '', url);
            }

            tabBtns.forEach((button) => {
                button.addEventListener('click', () => activateTab(button.dataset.tab));
            });

            const urlTab = new URLSearchParams(window.location.search).get('tab');
            if (urlTab === 'stats') activateTab('stats');
        </script>
    </body>
</html>
